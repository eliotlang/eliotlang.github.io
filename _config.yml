# Eliot — GitHub Pages (Jekyll) configuration
title: Eliot
tagline: Embedded Language for the Internet of Things
description: >-
  Eliot is the Embedded Language for the Internet of Things — a type system that
  makes correct, minimal embedded programs feel simple, even on a microcontroller
  with 32 bytes of RAM. The proofs live in the compiler, not in boilerplate you write.
url: "https://eliotlang.github.io"
lang: en

# Real project coordinates
github_repo: https://github.com/robertbraeutigam/eliot
status: Alpha · in active development

# Build settings
exclude:
  - download/
  - README.md
  - Gemfile
  - Gemfile.lock
  - .claude/
  - vendor/

# No external theme; the site ships its own brand stylesheet.
theme: null
plugins: []

# Documentation / tutorial — a multi-page section, one Markdown file per chapter.
# Order and grouping live in each chapter's front matter (`order:`, `part:`).
collections:
  docs:
    output: true
    permalink: /docs/:name/

defaults:
  - scope:
      path: ""
      type: docs
    values:
      layout: docs
