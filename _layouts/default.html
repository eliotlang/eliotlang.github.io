<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% if page.title and page.title != site.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }} — {{ site.tagline }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description | strip_newlines }}" />
  <meta name="theme-color" content="#0F1419" />
  <link rel="icon" href="{{ '/assets/img/eliot-favicon.svg' | relative_url }}" type="image/svg+xml" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="{{ site.title }} — {{ site.tagline }}" />
  <meta property="og:description" content="{{ site.description | strip_newlines }}" />
  <meta property="og:url" content="{{ site.url }}" />

  <link rel="stylesheet" href="{{ '/assets/css/eliot.css' | relative_url }}" />
  <script src="{{ '/assets/js/site.js' | relative_url }}" defer></script>
</head>
<body>
  {% include nav.html %}
  <main id="top">
    {{ content }}
  </main>
  {% include footer.html %}
</body>
</html>
